<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" role="img" aria-label="Manamnath Tiwari - thinks in chess moves, ships in commits">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2027"/>
      <stop offset="0.5" stop-color="#203A43"/>
      <stop offset="1" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7EE8FA"/>
      <stop offset="1" stop-color="#EEC0C6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="800" height="220" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="798" height="218" rx="15" fill="none" stroke="#2C5364" stroke-opacity="0.7"/>

  <!-- Name -->
  <text x="400" y="58" text-anchor="middle" font-family="'Segoe UI', Verdana, sans-serif" font-size="34" font-weight="700" letter-spacing="6" fill="url(#title)" opacity="0">
    MANAMNATH TIWARI
    <animate attributeName="opacity" from="0" to="1" dur="1.4s" begin="0.2s" fill="freeze"/>
  </text>

  <!-- Tagline -->
  <text x="400" y="88" text-anchor="middle" font-family="'Fira Code', Consolas, monospace" font-size="14" letter-spacing="1" fill="#9FB3C8" opacity="0">
    thinks in chess moves &#183; ships in commits
    <animate attributeName="opacity" from="0" to="1" dur="1.4s" begin="0.9s" fill="freeze"/>
  </text>

  <!-- Chessboard strip -->
  <g>
    <rect x="224" y="128" width="44" height="44" rx="4" fill="#13242B" opacity="0.95"/>
    <rect x="268" y="128" width="44" height="44" rx="4" fill="#274A54" opacity="0.95"/>
    <rect x="312" y="128" width="44" height="44" rx="4" fill="#13242B" opacity="0.95"/>
    <rect x="356" y="128" width="44" height="44" rx="4" fill="#274A54" opacity="0.95"/>
    <rect x="400" y="128" width="44" height="44" rx="4" fill="#13242B" opacity="0.95"/>
    <rect x="444" y="128" width="44" height="44" rx="4" fill="#274A54" opacity="0.95"/>
    <rect x="488" y="128" width="44" height="44" rx="4" fill="#13242B" opacity="0.95"/>
    <rect x="532" y="128" width="44" height="44" rx="4" fill="#274A54" opacity="0.95"/>
  </g>

  <!-- Glow trailing the knight -->
  <circle r="16" fill="#7EE8FA" opacity="0.35" filter="url(#glow)">
    <animateMotion dur="7s" repeatCount="indefinite"
      path="M246,150 Q268,108 290,150 Q312,108 334,150 Q356,108 378,150 Q400,108 422,150 Q444,108 466,150 Q488,108 510,150 Q532,108 554,150 Q400,206 246,150"/>
  </circle>

  <!-- Knight hopping across the board -->
  <text font-family="'Segoe UI Symbol', 'Noto Sans Symbols', sans-serif" font-size="36" text-anchor="middle" dominant-baseline="central" fill="#F5F7FA">
    &#9822;
    <animateMotion dur="7s" repeatCount="indefinite"
      path="M246,150 Q268,108 290,150 Q312,108 334,150 Q356,108 378,150 Q400,108 422,150 Q444,108 466,150 Q488,108 510,150 Q532,108 554,150 Q400,206 246,150"/>
  </text>

  <!-- Blinking cursor for that "shipping code" feel -->
  <rect x="556" y="78" width="9" height="16" fill="#7EE8FA">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
